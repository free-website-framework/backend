name: Build Lambda

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional custom image tag"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Load build.env
        run: cat build.env >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_FOR_GITHUB_ACTIONS }}"
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy a new image to a Lambda function
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: make deploy
